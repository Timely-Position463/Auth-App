server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_app
    username: ${db_username}
    password: ${db_password}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true


logging:
  level:
    org.springframework.security: DEBUG